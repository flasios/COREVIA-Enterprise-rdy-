image:
  repository: corevia-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

secret:
  create: true
  existingSecretName: ""

service:
  type: ClusterIP
  port: 5000
  annotations: {}

ingress:
  enabled: false
  className: ""
  host: corevia.local
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
    ephemeral-storage: 1Gi
  limits:
    memory: 1Gi

env:
  NODE_ENV: production
  PORT: "5000"
  COREVIA_INLINE_WORKER: "true"
  TRUST_PROXY: "true"
  ENABLE_REDIS: "true"
  CSRF_STRICT_MODE: "true"
  CSRF_ENFORCE_AUTH_ORIGIN: "true"
  MALWARE_SCAN_MODE: "required"
  ALLOW_SELF_REGISTER: "false"

secretEnv:
  DATABASE_URL: ""
  SESSION_SECRET: ""
  ALLOWED_ORIGINS: ""
  REDIS_URL: ""
  METRICS_AUTH_TOKEN: ""

extraEnv: []

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

startupProbe:
  httpGet:
    path: /api/health
    port: http
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

replicaCount: 1

worker:
  enabled: false
  replicaCount: 1
  port: 5002
  image:
    repository: corevia-processing-worker
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 512Mi
    limits:
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /health
      port: processing-worker-http
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /health
      port: processing-worker-http
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health/ready
      port: processing-worker-http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

backup:
  enabled: false
  schedule: "0 2 * * *"
  retentionDays: 30
  image: postgres:16
  destination: /backups
  pvc:
    enabled: false
    existingClaim: ""
    size: 50Gi
    storageClassName: ""
  env:
    PGDATABASE: ""
  secretEnv:
    DATABASE_URL: ""