{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
  labels:
    app.kubernetes.io/name: corevia
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: corevia
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          containers:
            - name: pg-backup
              image: {{ .Values.backup.image | quote }}
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: {{ .Release.Name }}-backup-secrets
              env:
                - name: BACKUP_DESTINATION
                  value: {{ .Values.backup.destination | quote }}
                - name: BACKUP_RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  mkdir -p "$BACKUP_DESTINATION"
                  ts="$(date +%Y%m%dT%H%M%S)"
                  pg_dump "$DATABASE_URL" --format=custom --file "$BACKUP_DESTINATION/corevia-${ts}.dump"
                  find "$BACKUP_DESTINATION" -type f -name 'corevia-*.dump' -mtime +"$BACKUP_RETENTION_DAYS" -delete
              volumeMounts:
                - name: backups
                  mountPath: {{ .Values.backup.destination | quote }}
          volumes:
            - name: backups
              {{- if .Values.backup.pvc.enabled }}
              persistentVolumeClaim:
                claimName: {{ if .Values.backup.pvc.existingClaim }}{{ .Values.backup.pvc.existingClaim }}{{ else }}{{ .Release.Name }}-backups{{ end }}
              {{- else }}
              emptyDir: {}
              {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backup-secrets
  labels:
    app.kubernetes.io/name: corevia
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
{{- range $key, $value := .Values.backup.secretEnv }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- if .Values.backup.pvc.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ if .Values.backup.pvc.existingClaim }}{{ .Values.backup.pvc.existingClaim }}{{ else }}{{ .Release.Name }}-backups{{ end }}
  labels:
    app.kubernetes.io/name: corevia
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backup.pvc.size }}
  {{- if .Values.backup.pvc.storageClassName }}
  storageClassName: {{ .Values.backup.pvc.storageClassName | quote }}
  {{- end }}
{{- end }}
{{- end }}