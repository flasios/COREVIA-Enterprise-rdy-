{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-secrets" .Release.Name) .Values.secret.existingSecretName }}
  labels:
    app.kubernetes.io/name: corevia
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
