{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-processing-worker
  labels:
    app.kubernetes.io/name: corevia-processing-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: corevia-processing-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corevia-processing-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: corevia-processing-worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - node
          args:
            - dist/worker/index.js
          securityContext:
{{ toYaml .Values.containerSecurityContext | indent 12 }}
          ports:
            - containerPort: {{ .Values.worker.port }}
              name: processing-worker-http
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ default (printf "%s-secrets" .Release.Name) .Values.secret.existingSecretName }}
          env:
            - name: PORT
              value: {{ .Values.worker.port | quote }}
            - name: WORKER_PORT
              value: {{ .Values.worker.port | quote }}
            - name: COREVIA_RUNTIME_NAME
              value: processing-worker
          startupProbe:
{{ toYaml .Values.worker.startupProbe | indent 12 }}
          livenessProbe:
{{ toYaml .Values.worker.livenessProbe | indent 12 }}
          readinessProbe:
{{ toYaml .Values.worker.readinessProbe | indent 12 }}
          resources:
{{ toYaml .Values.worker.resources | indent 12 }}
{{- end }}