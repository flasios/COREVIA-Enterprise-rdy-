name: Security Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-and-types:
    name: Dependency Type And Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Professional Quality Gate
        run: npm run quality:gate

      - name: ESLint Boundary Enforcement
        run: npx eslint "domains/**/*.ts" "brain/**/*.ts" "platform/**/*.ts" "interfaces/**/*.ts" --no-error-on-unmatched-pattern --no-warn-ignored

      - name: No New ts-nocheck Regression
        run: npm run quality:ts-nocheck

      - name: Architecture Boundary Regression Check
        run: npm run quality:architecture-boundary

      - name: Production Dependency Audit
        run: npm run security:audit

  helm-template-check:
    name: Helm Template Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Render Helm Chart
        run: |
          helm lint infrastructure/charts/corevia -f infrastructure/charts/corevia/values-production.yaml
          helm template corevia infrastructure/charts/corevia -f infrastructure/charts/corevia/values-production.yaml >/tmp/corevia-rendered.yaml
          test -s /tmp/corevia-rendered.yaml

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

  test-coverage:
    name: Test Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: corevia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run Tests with Coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/corevia_test
          NODE_ENV: test

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/server/
          retention-days: 14

      - name: Coverage Summary
        if: always()
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/server/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/server/coverage-summary.json').total;
              const fmt = (m) => s[m].pct + '%';
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + fmt('lines') + ' |');
              console.log('| Functions | ' + fmt('functions') + ' |');
              console.log('| Branches | ' + fmt('branches') + ' |');
              console.log('| Statements | ' + fmt('statements') + ' |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Semgrep Scan
        run: semgrep scan --config p/security-audit --config p/nodejs --config p/typescript --error

  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  image-vulnerability-scan:
    name: Container Image Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: corevia-api-ci
            dockerfile: infrastructure/docker/api.Dockerfile
          - name: ai-service
            image: corevia-ai-service-ci
            dockerfile: infrastructure/docker/ai-service.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}:ci
          load: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}:ci
          scanners: vuln
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"
          format: table

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --omit dev --output-file sbom.cdx.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  performance-smoke:
    name: Performance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: heliumdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres -d heliumdb
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Start App
        run: npm run dev > /tmp/corevia-dev.log 2>&1 &
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/heliumdb
          REDIS_URL: redis://127.0.0.1:6379
          ENABLE_REDIS: "true"
          SESSION_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          ALLOWED_ORIGINS: http://127.0.0.1:5000
          TRUST_PROXY: "true"
          CSRF_STRICT_MODE: "false"
          CSRF_ENFORCE_AUTH_ORIGIN: "false"
          MALWARE_SCAN_MODE: optional
          ALLOW_SELF_REGISTER: "false"

      - name: Wait For Health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/corevia-dev.log
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Performance Smoke
        run: npm run test:perf:smoke
